# Canonical platform-wide suppressions for adversarial-review and capture-findings.
# Applied automatically to every entity org repo that calls the reusable workflows
# from infra-commons/security — no per-repo changes needed.
#
# Privacy rule: this file is in a PUBLIC repo. It MUST NOT contain any private repo
# context (internal paths, names, emails, org-specific details). Those belong in each
# private repo's own .github/adversarial-review-suppressions.yml.
#
# Format:
#   - id: kebab-slug          # unique; canonical ids win over same-id repo-local entries
#     pattern: "regex"        # matched against the finding's file path
#     finding: "regex"        # matched against finding text (case-insensitive)
#     reason: >              # why this is a false positive for this architecture
#       Explanation.
#     expires: YYYY-MM-DD    # omit for permanent architectural decisions

suppressions:

  # ── CI/CD supply-chain: SHA pins ─────────────────────────────────────────────
  - id: sha-pin-first-party-workflows
    file_pattern: ".*\\.github/workflows/.*\\.ya?ml$"
    finding_pattern: "(external org commit hash|unpinned.{0,30}commit|commit hash without code visibility|[Uu]npinned external.*reusable)"
    reason: >
      Reusable workflows are intentionally pinned to immutable SHAs from first-party repos
      (infra-commons/security and each entity org's own security repo). The SHA is the
      supply-chain pin — these are not @main refs. infra-commons/security is public;
      entity security repos are private first-party. Finding is a false positive for this
      architecture.

  # ── CI/CD supply-chain: security.yml push trigger ────────────────────────────
  - id: security-push-trigger-intentional
    file_pattern: ".*\\.github/workflows/security\\.ya?ml$"
    finding_pattern: "(push.*triggers.*all branch|push.*including forks|push: ?\\{\\})"
    reason: >
      The security.yml push: {} trigger runs security scans on all branch pushes by design
      for immediate feedback. All entity org repos are private with branch protection —
      fork exposure does not apply. Intentional design decision.

  # ── CI/CD permissions: issues:write on adversarial-review job ────────────────
  - id: issues-write-adversarial-review-intentional
    file_pattern: ".*\\.github/workflows/.*\\.ya?ml$"
    finding_pattern: "(issues.*write.*without.*justification|added.*issues.*write.*adversarial|issues.*write.*permission.*adversarial)"
    reason: >
      The adversarial-review job requires issues: write so the gate job can open a tracking
      issue when CRITICAL findings are found. This permission is documented in the reusable
      workflow caller pattern and is the minimum required scope.

  # ── Supply-chain: first-party reusable workflow trust boundary ───────────────
  - id: first-party-reusable-workflow-trust
    file_pattern: ".*\\.github/workflows/.*\\.ya?ml$"
    finding_pattern: "(reusable workflow.{0,80}(external|third-party|separate org|untrusted|potentially untrusted)|(external|separate) (org|repo).{0,40}(supply.?chain|trust boundary|ownership)|org/repo trust not verifiable|without verified ownership)"
    reason: >
      All reusable workflows are SHA-pinned to first-party repos: infra-commons/{security,legal}
      (public, org-owned) and each entity org's own security repo (private, org-owned). There is
      no untrusted third-party org in this architecture; the "external org" framing is a false
      positive. The SHA pin is the supply-chain control. Permanent architectural decision.

  # ── Supply-chain: ANTHROPIC_API_KEY to first-party AI-review reusables ────────
  - id: anthropic-key-to-first-party-reusable
    file_pattern: ".*\\.github/workflows/.*\\.ya?ml$"
    finding_pattern: "ANTHROPIC_API_KEY.{0,60}(passed|secret|to).{0,40}(reusable workflow|external|third-party|infra-commons)"
    reason: >
      ANTHROPIC_API_KEY is intentionally passed to first-party infra-commons/{security,legal}
      reusable workflows that run our adversarial-review and legal-review AI checks. This is a
      documented, first-party data flow — not exfiltration to an external party. The Anthropic
      sub-processor relationship is covered by the sub-processor register / DPA. Permanent.

  # ── Static caller inputs to first-party legal reusables (jurisdictions/max_files)
  - id: static-input-to-first-party-legal-reusable
    file_pattern: ".*\\.github/workflows/legal-codebase-(audit|scan)\\.ya?ml$"
    finding_pattern: "(user-controlled|unsanitised|unsanitized).{0,60}(input|jurisdictions|max_files).{0,40}(external|reusable workflow)"
    reason: >
      jurisdictions and max_files are static, caller-authored literals committed in first-party
      workflow files — not attacker-controlled runtime input. They are passed to first-party
      reusables. No injection surface exists. False positive for this architecture.

  # ── issues:write on first-party legal-codebase-audit reusable ────────────────
  - id: issues-write-legal-codebase-audit-intentional
    file_pattern: ".*\\.github/workflows/legal-codebase-audit\\.ya?ml$"
    finding_pattern: "issues.{0,20}write.{0,60}(external|externally-controlled).{0,20}reusable workflow"
    reason: >
      legal-codebase-audit grants issues: write so the first-party reusable can file tracked
      legal findings as issues. Minimum required scope; the reusable is first-party. Intentional.

  # ── Suppression governance (self-authored suppression findings) ──────────────
  - id: suppression-file-governed-by-audit
    file_pattern: ".*adversarial-review-suppressions\\.ya?ml$"
    finding_pattern: "(self-authored suppression|suppression (bypasses|masks|removes)|AI agent.{0,40}suppress)"
    reason: >
      Suppressions are governed, not unchecked: canonical entries require an infra-commons/security
      PR (human review), the suppression-audit action audits every entry on each run, and
      canonical-wins-on-id prevents a downstream repo silently neutering a platform suppression.
      The secret flows referenced go to first-party infra-commons reusables (see
      anthropic-key-to-first-party-reusable), not external exfiltration. Human-oversight gate is
      the PR + suppression-audit, not removed.

  # ── First-party reusable SHA bumps are reviewed upgrades, not drift ──────────
  - id: first-party-reusable-sha-bump
    file_pattern: ".*\\.github/workflows/.*\\.ya?ml$"
    finding_pattern: "(SHA bump|SHA changed|unverified sha).{0,60}(reusable|third-party|action|without documented review)"
    reason: >
      A reusable-workflow/action SHA bump is an intentional, PR-reviewed upgrade of a first-party
      pin (infra-commons or the org's own repo). Pin-to-SHA is the supply-chain control; bumping
      the pin is the supported upgrade path, reviewed via the bumping PR. False positive.

  # ── Class 3: operator control-plane scripts reference the local deployment path ─
  - id: canonical-helper-script-path
    file_pattern: "(loop\\.sh|run.once\\.sh|queue.runner\\.sh|notify\\.sh|scripts/.*\\.sh)"
    finding_pattern: "(user.controlled|untrusted|unverified).{0,60}(path|directory|source|load).{0,40}(\\$HOME|home|sharedinfra)|scripts?.{0,20}(loaded|sourced).{0,20}from.{0,20}(untrusted|user.controlled|\\$HOME)"
    reason: >
      Control-plane bash scripts (loop.sh, run-once.sh, queue-runner.sh, notify.sh) load
      helpers from a fixed operator deployment path. This path is on the operator's own
      machine, is not user-controlled at runtime, and is not user-facing or data-subject PII.
      The "untrusted $HOME" framing assumes CI runner context — these scripts run as a
      systemd timer under the operator's account on a dedicated admin box. Permanent.

  # ── Class 4: operator username in a deployment path is not data-subject PII ──
  - id: personal-name-in-deployment-path
    file_pattern: "(loop\\.sh|run.once\\.sh|queue.runner\\.sh|notify\\.sh|scripts/.*\\.sh|plans/.*\\.sh)"
    finding_pattern: "(personal.{0,10}(name|identifier)|first.{0,10}name|username).{0,60}(path|comment|deploy|home.dir|version.controlled|source.code)"
    reason: >
      An operator account name appearing in a deployment-path comment or shell script is
      infrastructure metadata, not data-subject personal information under the Privacy Act
      2020. These paths are on the operator's own admin box, not in user-facing code or
      stored alongside data subjects' information. Permanent.

  # ── Class 6: the AI review PR comment IS the human oversight gate ──────────
  - id: human-oversight-gate-by-design
    file_pattern: ".*\\.github/workflows/security\\.ya?ml$"
    finding_pattern: "(AI|automated).{0,40}(review|analysis|finding).{0,80}without.{0,40}(documented|human oversight|oversight gate|human review)|review.{0,40}comment.{0,40}without.{0,40}(oversight|human)"
    reason: >
      The adversarial-review and legal-review jobs post findings as PR comments that a human
      developer reads before merging. The developer's review IS the human oversight step.
      Additionally, the CRITICAL-findings gate job hard-blocks merges until a human resolves
      the finding — that is a mandatory documented oversight gate. The reviewer is incorrectly
      flagging its own review-posting architecture as lacking oversight. Permanent.
