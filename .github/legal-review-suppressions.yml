# Canonical platform-wide suppressions for legal-capture-findings.
# Applied automatically to every entity org repo that calls the reusable workflow
# from infra-commons/security — no per-repo changes needed.
#
# Privacy rule: this file is in a PUBLIC repo. It MUST NOT contain any private repo
# context (internal paths, names, emails, org-specific details). Those belong in each
# private repo's own .github/legal-review-suppressions.yml (merged by the workflow).
#
# Suppression gates ISSUE FILING only — findings still appear in the run log.
# A suppressed finding is never re-filed; it remains visible for audit in the CI logs.
#
# Format:
#   - id: kebab-slug          # unique; identifies the class in run logs
#     file_pattern: "regex"   # matched against the finding's location field (case-insensitive)
#     finding_pattern: "regex" # matched against the finding title + description (case-insensitive)
#     reason: >               # why this is a false positive for this architecture (auditable)
#       Explanation.
#     expires: YYYY-MM-DD     # omit for permanent architectural decisions

suppressions:

  # ── Class 1: infra-commons reusable workflows are first-party, not third-party ─
  - id: own-reusable-mislabeled-third-party
    file_pattern: "\\.github/workflows/.*\\.ya?ml(:\\d+)?$"
    finding_pattern: "(third.party|external (org|repo|organisation)|vendor org|separate org|outside (org|organisation)).{0,100}(infra.commons|reusable workflow)|reusable workflow.{0,80}(external|third.party|untrusted|separate org)"
    reason: >
      Reusable workflows in infra-commons are first-party — the same operator controls all
      entity orgs and infra-commons. The reviewer flags infra-commons as "external" because
      the org name differs from the calling repo's org. SHA-pinned first-party reusables are
      the approved call pattern. Not a third-party trust concern. Permanent.

  # ── Class 2: AI review workflows deliberately route to Anthropic/OpenAI ──────
  - id: ai-sub-processor-security-workflow
    file_pattern: "\\.github/workflows/security\\.ya?ml(:\\d+(-\\d+)?)?$"
    finding_pattern: "(PR content|pull request|diff|code content).{0,80}(OpenAI|Anthropic|overseas|US API)|routed to (OpenAI|Anthropic)|(OpenAI|Anthropic).{0,50}(overseas|cross.border|sub.processor)"
    reason: >
      The security.yml adversarial-review and legal-review jobs deliberately send PR diffs to
      OpenAI and Anthropic for AI analysis — that is their entire purpose. PR diffs contain
      code changes, not customer personal information. The Anthropic and OpenAI sub-processor
      relationships are covered in the operator's sub-processor register and DPA disclosures.
      Permanent architectural decision.

  # ── Class 3: operator home-directory paths in control-plane scripts ───────────
  - id: canonical-helper-script-path
    file_pattern: "(scripts/|plans/|loop\\.sh|run.once\\.sh|queue.runner\\.sh|notify\\.sh|autoloop)"
    finding_pattern: "(home directory|home.{0,20}path|personal home).{0,80}(reveal|individual|identity|user|personal|expose)|(hardcoded.{0,30}(path|directory).{0,30}(personal|home|reveal|individual|user))"
    reason: >
      Control-plane scripts and autoloop verify.sh files reference the operator's local
      deployment path (e.g. ~/repos/sharedinfra). This is an admin-only path on the
      operator's own machine — not user-facing, not stored alongside data subjects' information,
      and not personal information under the Privacy Act 2020. Permanent.

  # ── Class 4: operator account name in deployment path is not data-subject PII ─
  - id: personal-name-in-deployment-path
    file_pattern: "(scripts/|plans/|loop\\.sh|run.once\\.sh|queue.runner\\.sh|notify\\.sh)"
    finding_pattern: "(first.name|username|personal.{0,5}name).{0,80}(path|comment|identifier|home.dir|version.controlled|source.code)|(comment.{0,60}(home directory|personal home).{0,40}(first.name|identifier))"
    reason: >
      An operator account name (short system username) appearing in an infrastructure path
      comment is not personal information under the Privacy Act 2020 — it is a deployment-path
      metadata identifier in an admin-only control-plane tool. These scripts are not published
      to data subjects and process no customer PII at the paths in question. Permanent.

  # ── Class 5: dependabot/first-party SHA-pin bumps are reviewed upgrades ────────
  - id: routine-pinned-action-sha-bump
    file_pattern: "\\.github/workflows/.*\\.ya?ml(:\\d+)?$"
    finding_pattern: "(SHA|commit hash|commit).{0,60}(bump|bumped|changed|updated?|pinned)|(bump|bumped|changed|updated?|pinned).{0,60}(SHA|commit hash|commit)|(SHA|commit hash).{0,60}without.{0,40}(review|provenance|audit|rationale|changelog)"
    reason: >
      Dependabot and deliberate SHA-pin bumps in workflow files are intentional, PR-reviewed
      upgrades of first-party SHA pins. Pin-to-SHA is the supply-chain control; bumping the pin
      via a reviewed PR is the supported upgrade path. The reviewer describes this same event as
      both "SHA bump" and "commit hash update" depending on phrasing, so the pattern must match
      either wording. Permanent.

  # ── Class 6: AI review PR comment IS the human oversight gate ────────────────
  - id: human-oversight-gate-by-design
    file_pattern: "\\.github/workflows/security\\.ya?ml(:\\d+(-\\d+)?)?$"
    finding_pattern: "(AI.{0,30}(review|generated|analysis|comment).{0,80}without.{0,40}(human oversight|oversight gate|accuracy controls|human review|documented)|automated.{0,50}without.{0,30}(oversight|human))"
    reason: >
      The adversarial-review and legal-review jobs post findings as PR comments that a human
      developer reads before merging. The developer's review IS the documented human oversight
      step. The CRITICAL-findings gate job hard-blocks merges until a human resolves the finding
      — that is a mandatory oversight gate. The reviewer is flagging its own review-posting
      architecture as lacking oversight. Permanent.

  # ── Class 7: synthetic test fixtures are not data-subject PII ──────────────────
  - id: synthetic-test-fixture-pii
    file_pattern: "(^|/)(tests?/|.*_test\\.|test_.*|.*\\.spec\\.|fixtures?/|conftest\\.py)"
    finding_pattern: "(test (fixture|data|double|sample)|fixture|synthetic|sample data|mock (data|user)).{0,80}(pii|personal (info|data)|named individual|realistic.{0,15}(name|person)|privacy)|realistic.{0,20}(name|individual).{0,40}test"
    reason: >
      Test fixtures and sample data use deliberately synthetic, non-real identities to exercise
      code paths. They are not the personal information of any data subject and are never used to
      process real people's data. Flagging a synthetic fixture name as a PII-hygiene risk is a
      false positive. Permanent.

  # ── Class 8: Anthropic inference sub-processor is a disclosed, accepted decision ─
  - id: anthropic-inference-residency-accepted
    finding_pattern: "(cross.border|overseas|off.?shore|sub.?processor|inference (provider|residency|to)).{0,90}(anthropic|united states|\\bus\\b)|anthropic.{0,80}(cross.border|overseas|us inference|sub.?processor|permanent|all environments)"
    reason: >
      Routing model inference to Anthropic (US) is a formalised, disclosed, accepted architectural
      decision — documented in the inference-provider ADR, the operator's sub-processor register,
      a residency configuration setting, and the customer data-processing agreements. Documenting or
      restating that accepted decision (e.g. in an ADR) is not itself a legal defect. A genuinely
      new transfer concern should be raised against the DPA/register, not re-filed per merge.
      Permanent.

  # ── Batch-triage 2026-07-11 (rolliq-com decision lane) — settled legal-ai FP families ──
  - id: security-review-generic-customer-phrasing
    file_pattern: "SECURITY-REVIEW\\.md"
    finding_pattern: "(microsoft.?aligned|azure ai foundry account).{0,100}(infer|identif|confidential)"
    reason: "Generic customer-category phrasing in a security review doesn't identify the actual client."

  - id: sandbox-staging-enablement-not-new-risk
    file_pattern: "clients/sandbox\\.yaml"
    finding_pattern: "(enabled_environments|staging).{0,80}(candidate pii|widens? (the )?surface|self.?attest)"
    reason: "Enabling staging in clients/sandbox.yaml isn't a new risk on its own."

  - id: security-doc-roadmap-disclosure
    file_pattern: "docs/SECURITY\\.md"
    finding_pattern: "(PIM|just.?in.?time|periodic (security )?(document )?review).{0,80}(roadmap|not yet configured|standing (process|commitment))"
    reason: "docs/SECURITY.md honestly disclosing PIM/periodic-review as roadmap items is accurate self-disclosure, not a new risk."

  - id: internal-doc-operational-notes
    file_pattern: "docs/security-hardening-checklist\\.md"
    finding_pattern: "(personal (work )?email|kev.{0,3}rolliq|claude.{0,40}(sign.?off|perform).{0,40}(security|hardening)|AI agent.{0,40}without.{0,40}human oversight)"
    reason: "Owner email / AI-authored step notes in an internal ops doc are internal notes, not customer-facing risk."

  - id: classify-call-name-verification-covered
    file_pattern: "src/workflows/classify_call\\.py"
    finding_pattern: "(candidate name|extract_candidate_name).{0,100}(without.{0,20}(explicit )?(human )?verification|human review)"
    reason: "LLM-extracted candidate name is already covered by the existing human-in-the-loop recruiter review step."

  - id: dependabot-comment-cosmetic-name
    file_pattern: "\\.github/dependabot\\.yml"
    finding_pattern: "(first name|named individual).{0,80}(comment|config)"
    reason: "First name in a dependabot.yml config comment is cosmetic."

  - id: steered-baseline-eval-fixture-not-live-behavior
    file_pattern: "evals/cases/.*steered-baseline"
    finding_pattern: "(recruiter steering|steering mechanism).{0,80}(eval|fixture|framing|emphasis)"
    reason: "Recruiter steering mechanism in an eval fixture tests robustness, not a live production behavior."

  - id: trivyignore-removal-is-improvement
    file_pattern: "\\.trivyignore"
    finding_pattern: "(AVD-AZU-0012|suppression removed|re.?enabl(ed|ing)).{0,80}(scan|scanned|public network access)"
    reason: ".trivyignore suppression removal (re-enabling a scan) is an improvement, not a new risk."

  # ── Issue-sweep 2026-07-11: accepted/disclosed legal-ai classes (wont-fix) ─────
  # Each entry is scoped by file + finding text so it settles only the specific
  # accepted class and does not mask genuine future legal items at the same path.

  - id: microsoft-graph-customer-tenant-not-new-subprocessor
    file_pattern: '(templates/dpa\.md|.*/dpa\.md)'
    finding_pattern: '(microsoft graph|graph api)[^\n]{0,160}(sub.?processor|consent|disclos)'
    reason: "For Microsoft-stack deployments the Graph API operates within the customer's own Microsoft 365 tenant (their system of record), delivering to the customer's own SharePoint; it is not a new external sub-processor introduced by Rolliq. Disclosed, accepted architecture, maintained in the DPA sub-processor list and privacy notice."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: self-operated-dpa-onboarding-check-process-control
    file_pattern: 'docs/onboarding-checklist\.md'
    finding_pattern: 'self.?operated[^\n]{0,180}(dpa|coverage|compliance|handover|manual|enforc)'
    reason: "The self-operated handover / DPA-coverage check is a documented onboarding process control, not a schema-enforced deploy gate. No client is self-operated today and the schema already requires self-operated to imply client-owned infrastructure. Adding a hard schema gate is tracked as clients-config#177."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: sharepoint-site-id-non-secret-identifier
    file_pattern: 'clients/.*\.ya?ml'
    finding_pattern: '(sharepoint.?site.?id|site.?id)[^\n]{0,180}(hardcoded|topology|structural identifier|exposes|plaintext)'
    reason: "A SharePoint site ID is a non-secret routing identifier (comparable to an Azure resource ID). Access is gated by the Graph Sites.Selected grant and the per-site managed-identity permission, not by obscurity of the ID; the entry concerned is Rolliq's own sandbox site holding synthetic data."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: model-name-in-solution-yaml-not-ip-copyright-risk
    file_pattern: 'SOLUTION\.ya?ml'
    finding_pattern: '(gpt|model)[^\n]{0,150}(ip|copyright)[^\n]{0,80}(risk|output|undisclosed)'
    reason: "Naming the inference model in SOLUTION.yaml is configuration metadata, not an IP or copyright exposure. AI-generated output is produced under the client DPA and delivered to the client; model licensing is governed by the provider terms (Azure OpenAI or Anthropic), already accepted."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: candidate-erasure-payload-search-hardened
    file_pattern: 'scripts/delete-client-data\.py'
    finding_pattern: '(candidate.?scoped|erasure|payload text search|ilike)[^\n]{0,180}(over.?delet|under.?delet|imprecise|precision)'
    reason: "webhook_events has no candidate_name column, so candidate-scoped erasure matches the raw payload text. The match now escapes ILIKE metacharacters so a name cannot wildcard-match unrelated rows, and it is bounded by client_id scoping; the residual substring imprecision is inherent to searching a schemaless payload and is accepted."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: webhook-ledger-null-retain-until-aged-by-created-at
    file_pattern: 'src/storage/webhook_ledger\.py'
    finding_pattern: '(retain_until|retention)[^\n]{0,180}(null|no defined|no maximum|indefinit)'
    reason: "Rows with a NULL retain_until are aged out on created_at + retention_days (the same rule applied to pre-stamp blobs), so there is no indefinite-retention path for webhook_events. Enforcement/enablement status is tracked in the ADR-0006 issues."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: capture-findings-audit-comment-no-customer-pii
    file_pattern: '\.github/workflows/capture-findings\.yml'
    finding_pattern: '(audit comment|findings)[^\n]{0,180}(pii|candidate|referee)[^\n]{0,90}(retention|no.{0,20}control)'
    reason: "The capture-findings audit comment records finding metadata (file, severity, short description) from the merged diff, not candidate or referee records. Review prompts are instructed not to echo PII, and findings live in the repo issue tracker under the same access controls as the code; no customer PII store is created here."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"

  - id: single-operator-approval-compensated-solo-shop
    file_pattern: 'docs/.*provision.*\.md'
    finding_pattern: '(single.?operator|one operator|solo)[^\n]{0,180}(approv|oversight|segregation|second.?person)'
    reason: "Segregation of duties between operator and approver is not currently possible in a single-operator company. Compensating controls are documented (recorded pre-session authorization, before/after checklist, least-privilege time-boxed elevation removed at session end), and the structural fix is the tracked foundry-deployment Terraform module that removes manual tenant access."
    added: "2026-07-11"
    added_by: "kev@rolliq.com"
