name: Daily health check (reusable)

# Reusable daily health check for Rolliq solution repos.
#
# Caller pattern (trigger daily + workflow_dispatch):
#
#   on:
#     schedule:
#       - cron: '0 8 * * *'   # 08:00 UTC daily
#     workflow_dispatch:
#       inputs:
#         dry_run:
#           type: boolean
#           default: false
#
#   concurrency:
#     group: daily-health-check
#     cancel-in-progress: false
#
#   jobs:
#     health-check:
#       uses: infra-commons/security/.github/workflows/daily-health-check-reusable.yml@<SHA>
#       with:
#         dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
#       secrets:
#         ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
#         # Approver App (same identity the auto-merge-churn lane uses). REQUIRED
#         # for minor/patch Dependabot PRs to actually auto-merge: GitHub forbids
#         # the Actions GITHUB_TOKEN from approving, so without a distinct App the
#         # approve fails soft and the PR waits for a human. Omit and Dependabot
#         # triage still runs, just without the auto-approve.
#         approve_app_id:          ${{ secrets.AUTOMERGE_APP_ID }}
#         approve_app_private_key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
#
# Required caller permissions:
#   contents:      write   (squash-merge Dependabot PRs via auto-merge)
#   pull-requests: write   (approve Dependabot PRs)
#   actions:       write   (re-run failed workflows)
#   issues:        write   (file / close health-check issues)

permissions: {}

on:
  workflow_call:
    inputs:
      merge_dependabot:
        description: >-
          Auto-approve and enable auto-merge for minor/patch Dependabot PRs.
          Set to false to disable (e.g. in repos with strict human-review policies).
        type: boolean
        required: false
        default: true
      lookback_hours:
        description: >-
          Hours of run history to scan for failures. Default 25 slightly exceeds
          one day so a run that starts a few minutes late doesn't miss yesterday's failure.
        type: number
        required: false
        default: 25
      dry_run:
        description: >-
          Diagnose only — no re-runs, no issues filed, no PR approvals.
          Useful for testing or manually inspecting what the agent would do.
        type: boolean
        required: false
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        required: false   # Falls back to pattern-only diagnosis without it
      approve_app_id:
        required: false   # Approver App ID. Without it, Dependabot approvals fail soft.
      approve_app_private_key:
        required: false   # Approver App private key (PEM).

jobs:
  health-check:
    name: Daily health check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents:      write
      pull-requests: write
      actions:       write
      issues:        write
    # `secrets` context is NOT available in a step `if:` (it fails workflow
    # parsing with a startup_failure), but `env` IS — so hoist the presence
    # check here and gate the mint step on env below.
    env:
      HAS_APPROVER_APP: ${{ secrets.approve_app_id != '' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Mint an installation token for the approver App so the Dependabot approve
      # acts as a distinct identity — GitHub forbids the Actions GITHUB_TOKEN
      # from approving PRs. Skipped when no App is configured; the action then
      # gets an empty approve-token and the approve fails soft, as before.
      - name: Mint approver App token
        id: approver
        if: ${{ env.HAS_APPROVER_APP == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id:      ${{ secrets.approve_app_id }}
          private-key: ${{ secrets.approve_app_private_key }}

      - uses: infra-commons/security/.github/actions/daily-health-check@daily-health-check/v1
        with:
          github-token:      ${{ github.token }}
          # Used ONLY to approve Dependabot PRs (github.token cannot). Empty when
          # no App is wired → approve fails soft. Everything else — re-runs,
          # issue filing, enabling auto-merge — stays on github.token above.
          approve-token:     ${{ steps.approver.outputs.token }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          repo:              ${{ github.repository }}
          run-url:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          lookback-hours:    ${{ inputs.lookback_hours }}
          merge-dependabot:  ${{ inputs.merge_dependabot }}
          dry-run:           ${{ inputs.dry_run }}
