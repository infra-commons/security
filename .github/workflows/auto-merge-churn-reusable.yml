name: Auto-merge churn (reusable)

# Auto-approves and enables native auto-merge for LOW-RISK, BOT-AUTHORED churn
# PRs so Kevin's review queue is not spent on mechanical sync/fix PRs. It NEVER
# merges anything itself — it only approves (satisfying the reviews:1 ruleset)
# and turns on `--auto`, so the full required-check gauntlet (adversarial,
# legal, tests, pin-check) still runs and gates the merge exactly as today.
#
# This changes WHO can merge WHAT without a human review, so its first
# deployment is a deliberate, Kevin-approved step (Plan 1c).
#
# ── Eligibility (ALL must hold) ────────────────────────────────────────────────
#   1. PR author ∈ { rolliqdotcom, infra-commons-bot, dependabot[bot] }
#   2. NONE of the changed files hit a hard-exclusion guardrail (below)
#   3. EITHER every changed file matches the path allowlist
#      (suppressions + confidential-terms, plus any caller-supplied globs)
#      OR the PR carries the label `autofix:security`
# Anything else is a silent no-op — the PR simply waits for Kevin as before.
#
# ── Hard exclusions (cannot be overridden by any allowlist) ────────────────────
#   • .github/workflows/**   ← self-privilege-escalation guard. NOTE: this is why
#     "action-pin sync" PRs (pins live inside workflow files) are NOT auto-merged
#     — they fall through to Kevin by design.
#   • **/branch-rulesets.json, **/CODEOWNERS, scripts/apply-branch-rulesets.sh
#   • clients-config repo entirely (belt-and-braces; callers also simply omit it)
#   • dependabot major bumps never match the allowlist or carry the label, so
#     they naturally fall through (daily-health-check already handles the
#     minor/patch dependabot lane; dependabot is listed here only for parity).
#
# ── Caller pattern ─────────────────────────────────────────────────────────────
#   name: Auto-merge churn
#   on:
#     pull_request_target:            # NOT pull_request — a pull_request run from
#       types: [opened, reopened, synchronize, labeled, ready_for_review]
#   # bot-authored PRs gets a read-only token and no auto-merge rights.
#   # pull_request_target runs in the base repo with a write token. This workflow
#   # never checks out or executes PR code — it only calls the gh API on the PR
#   # number — so pull_request_target is safe here.
#   concurrency:
#     group: auto-merge-churn-${{ github.event.pull_request.number }}
#     cancel-in-progress: true
#   permissions:
#     contents: write          # enable auto-merge / squash
#     pull-requests: write      # approve + enable auto-merge
#   jobs:
#     auto-merge:
#       uses: infra-commons/security/.github/workflows/auto-merge-churn-reusable.yml@<SHA>
#       secrets:
#         # A GitHub App identity that can APPROVE PRs. REQUIRED for the approve to
#         # work: GITHUB_TOKEN is hard-blocked from approving, and the bot PR authors
#         # (rolliqdotcom / infra-commons-bot / dependabot) cannot approve their OWN
#         # PRs — so the approver must be a distinct 4th identity. The App must be
#         # installed on the caller repo with pull-requests:write + contents:write.
#         # If omitted, the job still runs but the approve step fails soft (the PR
#         # simply waits for a human), so callers can wire it before the App exists.
#         approve_app_id:          ${{ secrets.AUTOMERGE_APP_ID }}
#         approve_app_private_key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
#       # optional: extend the path allowlist with repo-specific sync-managed files
#       # with:
#       #   allowed_globs: |
#       #     .github/some-other-sync-managed-file.txt

permissions: {}

on:
  workflow_call:
    inputs:
      allowed_globs:
        description: >-
          Extra newline-separated path globs to treat as auto-mergeable, ON TOP
          of the built-in suppressions + confidential-terms allowlist. Use ** to
          match across directories. Files under a hard-exclusion (.github/
          workflows/**, rulesets, CODEOWNERS) are never eligible regardless.
        type: string
        required: false
        default: ""
    secrets:
      approve_app_id:
        description: >-
          App ID of a GitHub App (distinct from the bot PR authors) that can
          approve PRs. Optional: if empty, the approve step falls back to
          GITHUB_TOKEN and fails soft (the PR waits for a human).
        required: false
      approve_app_private_key:
        description: Private key (PEM) for the approver GitHub App.
        required: false

jobs:
  auto-merge:
    name: Evaluate + auto-merge eligible churn
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The workflow-level `permissions: {}` above caps every job to zero perms by
    # default, so the token this job actually gets must be granted HERE (a reusable
    # workflow's jobs do NOT inherit the caller's permissions past a workflow-level
    # `permissions:` declaration). Without this the very first `gh pr view` fails
    # with "resource not accessible by integration". Still capped by the caller's
    # own grant, so a caller that grants less than this simply gets less.
    permissions:
      contents: write        # enable native auto-merge / squash
      pull-requests: write   # read PR files/labels, approve, enable auto-merge
    # `secrets` context is NOT available in a step `if:` (it fails workflow parsing
    # → startup_failure), so surface the App-id presence as an env var here and gate
    # the mint step on that instead. `env` referencing `secrets` is allowed, and
    # `env` IS available in step `if:`.
    env:
      HAS_APPROVER_APP: ${{ secrets.approve_app_id != '' }}
    # Only bot authors can ever be eligible — cheap pre-filter so human PRs skip
    # the job entirely. The script re-checks the full author allowlist too.
    if: >-
      github.event.pull_request.user.login == 'rolliqdotcom' ||
      github.event.pull_request.user.login == 'infra-commons-bot' ||
      github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      # Mint an installation token for the approver App so the approve step acts as
      # a distinct identity (GITHUB_TOKEN cannot approve; the bot PR authors cannot
      # approve their own PRs). Skipped when no App is configured — the job then
      # falls back to GITHUB_TOKEN and the approve fails soft.
      - name: Mint approver App token
        id: approver
        if: ${{ env.HAS_APPROVER_APP == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.approve_app_id }}
          private-key: ${{ secrets.approve_app_private_key }}

      # Wrapped as a composite (pinned to the auto-merge-churn/v1 moving tag, not a
      # raw SHA — see README's "per-family moving tags" section) so a fix to the
      # eligibility logic ships by moving that tag, matching every other reusable
      # in this repo (capture-findings, daily-health-check, weekly-security-scan,
      # suppression-audit). No reusable/consumer edit needed to pick up a fix.
      - uses: infra-commons/security/.github/actions/auto-merge-churn@auto-merge-churn/v1
        with:
          # App token (can approve) when configured; otherwise GITHUB_TOKEN, which
          # can read/enable-auto-merge but fails soft on the approve.
          github-token: ${{ steps.approver.outputs.token || github.token }}
          repo: ${{ github.repository }}
          pr-number: ${{ github.event.pull_request.number }}
          pr-author: ${{ github.event.pull_request.user.login }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          allowed-globs: ${{ inputs.allowed_globs }}
