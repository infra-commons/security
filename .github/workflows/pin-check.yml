name: Pin check

# Guards the supply chain: every `uses:` in this repo must be pinned to a 40-char
# commit SHA (or be a local `./` ref / digest-pinned image / own-repo capture-findings
# version tag — see check-action-pins.sh). Prevents a SHA-pinned reusable workflow from
# internally calling a composite action at a mutable `@main`, which would defeat
# callers' pins. See .github/scripts/check-action-pins.sh.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pin-check:
    name: All action refs SHA-pinned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check action pins
        run: bash .github/scripts/check-action-pins.sh
